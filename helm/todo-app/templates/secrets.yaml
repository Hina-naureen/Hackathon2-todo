# helm/todo-app/templates/secrets.yaml
# References: specs/architecture.md §Phase IV Layer Diagram
#             specs/features/authentication.md §Better Auth Configuration
#
# All sensitive runtime values are held here — never in values.yaml or
# Deployment env: blocks. Kubernetes controllers redact Secret data from
# audit logs; plain ConfigMap env vars are logged in plaintext.
#
# Injection at install time (no secret in git):
#
#   helm install todo-app ./helm/todo-app \
#     --set secrets.databaseUrl="postgresql+psycopg2://..." \
#     --set secrets.betterAuthSecret="$(openssl rand -hex 32)" \
#     --set secrets.openaiApiKey="sk-..."
#
# Or use a values override file that is NOT committed to git:
#
#   helm install todo-app ./helm/todo-app -f my-secrets.yaml
#
# Validation: the `required` function aborts `helm install` with a clear
# error message if a mandatory value is missing — fail-fast, no silent
# SQLite fallback, no empty secrets.

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: secrets
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  annotations:
    # Helm will update this Secret on every `helm upgrade`.
    # The annotation documents that this resource is managed by Helm.
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
type: Opaque
# stringData: Kubernetes base64-encodes values automatically.
# Using stringData (not data:) keeps the Helm template readable and avoids
# double-encoding mistakes that occur when using b64enc in templates.
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required. Pass --set secrets.databaseUrl=<url>" .Values.secrets.databaseUrl | quote }}
  BETTER_AUTH_SECRET: {{ required "secrets.betterAuthSecret is required. Pass --set secrets.betterAuthSecret=<hex>" .Values.secrets.betterAuthSecret | quote }}
  # OPENAI_API_KEY is optional. Without it the agent runs in local keyword-simulation mode.
  # The backend degrades gracefully — it does not crash on an empty key.
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "" | quote }}
