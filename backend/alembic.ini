# alembic.ini — Alembic configuration for Phase II (Neon DB / SQLite)
# References: specs/database/schema.md
#
# Usage:
#   cd backend/
#   uv run alembic upgrade head          # apply all migrations
#   uv run alembic downgrade -1          # roll back one migration
#   uv run alembic revision --autogenerate -m "description"   # create new migration

[alembic]
# Path to the Alembic migration scripts directory.
script_location = alembic

# Filename pattern for generated migration scripts.
file_template = %%(id)s_%%(slug)s

# Timezone for generated migration timestamps.
timezone = UTC

# DATABASE_URL is read from .env by alembic/env.py — do not set sqlalchemy.url here.
# Leaving it blank forces env.py to be the single source of truth.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
